worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # JSON structured access log
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    server_tokens      off;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # Security headers (applied globally, overridden per-vhost)
    add_header X-Content-Type-Options "nosniff"                    always;
    add_header X-Frame-Options        "DENY"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api_global:20m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=otp_strict:10m  rate=3r/m;
    limit_req_zone  $binary_remote_addr zone=admin_login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Client limits
    client_max_body_size    10M;
    client_body_timeout     30s;
    client_header_timeout   15s;
    send_timeout            30s;

    include /etc/nginx/conf.d/*.conf;
}
