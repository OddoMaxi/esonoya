# ─── Upstreams ────────────────────────────────────────────────────────────────
# To run 2 API replicas: docker compose up --scale api=2 -d
# Docker's embedded DNS resolves "api" to all replica IPs.
upstream api_servers {
    least_conn;
    server api:8000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream citizen_app {
    server citizen:3000;
    keepalive 8;
}

upstream admin_app {
    server admin:3001;
    keepalive 8;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ─── API — api.esonoya.gov.gn ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.esonoya.gov.gn;

    ssl_certificate     /etc/nginx/ssl/api.crt;
    ssl_certificate_key /etc/nginx/ssl/api.key;

    include /etc/nginx/conf.d/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Health check — no rate limit, no auth
    location = /up {
        proxy_pass http://api_servers/up;
        proxy_set_header Host $host;
        access_log off;
    }

    # OTP — strict rate limit (matches Laravel's otp-send limiter)
    location ~ ^/api/auth/send-otp {
        limit_req zone=otp_strict burst=3 nodelay;
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://api_servers;
    }

    # Admin login — strict rate limit
    location ~ ^/api/admin/auth/login {
        limit_req zone=admin_login burst=3 nodelay;
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://api_servers;
    }

    # All other API routes
    location /api/ {
        limit_req  zone=api_global burst=30 nodelay;
        limit_conn conn_per_ip 30;
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://api_servers;
    }

    # Block everything else
    location / {
        return 404;
    }
}

# ─── Citizen Frontend — esonoya.gov.gn ───────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name esonoya.gov.gn www.esonoya.gov.gn;

    ssl_certificate     /etc/nginx/ssl/citizen.crt;
    ssl_certificate_key /etc/nginx/ssl/citizen.key;

    include /etc/nginx/conf.d/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://citizen_app;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass http://citizen_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}

# ─── Admin Dashboard — admin.esonoya.gov.gn ──────────────────────────────────
server {
    listen 443 ssl http2;
    server_name admin.esonoya.gov.gn;

    ssl_certificate     /etc/nginx/ssl/admin.crt;
    ssl_certificate_key /etc/nginx/ssl/admin.key;

    include /etc/nginx/conf.d/ssl-params.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Restrict admin to government IP ranges if needed
    # allow 197.149.0.0/16;  # Guinea government network
    # deny all;

    location / {
        include /etc/nginx/conf.d/proxy-params.conf;
        proxy_pass http://admin_app;
    }

    location /_next/static/ {
        proxy_pass http://admin_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
