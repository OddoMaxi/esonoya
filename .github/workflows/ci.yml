name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── PHP — Tests & Code Style ───────────────────────────────────────────────
  php:
    name: PHP 8.3 — Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: esonoya_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_pgsql, redis, gd, zip, bcmath, intl, opcache, pcntl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend-api/vendor
          key: composer-${{ hashFiles('backend-api/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: esonoya_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ""
          CACHE_STORE: redis
          QUEUE_CONNECTION: redis
          SESSION_DRIVER: redis
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: esonoya_test
          DB_USERNAME: postgres
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ""
          CACHE_STORE: redis
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          SMS_PROVIDER: log
          MAIL_MAILER: log
        run: php artisan test --parallel

  # ─── Citizen Frontend ───────────────────────────────────────────────────────
  citizen:
    name: Citizen App — Type check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-citizen

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-citizen/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.esonoya.gov.gn
        run: npm run build

  # ─── Admin Dashboard ────────────────────────────────────────────────────────
  admin:
    name: Admin Dashboard — Type check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: admin-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.esonoya.gov.gn
        run: npm run build
