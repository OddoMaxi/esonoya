version: "3.9"

# Shared config reused by api / worker / scheduler
x-api: &api
  build:
    context: ./backend-api
    target: production
  env_file: .env.production
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - backend
  restart: unless-stopped
  volumes:
    - app_storage:/var/www/html/storage/app
    - app_logs:/var/www/html/storage/logs

services:

  # ─── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      # Mount SSL certs (managed externally via certbot or government CA)
      - ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      citizen:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped

  # ─── API — PHP 8.3 + FPM + Nginx (2 replicas behind LB) ─────────────────────
  # Scale with: docker compose up --scale api=2 -d
  api:
    <<: *api
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/up"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ─── Queue Workers (2 replicas) ───────────────────────────────────────────────
  worker:
    <<: *api
    command: >
      php artisan queue:work redis
      --sleep=3
      --tries=3
      --max-time=3600
      --memory=256
      --queue=default,notifications,reminders
    deploy:
      replicas: 2

  # ─── Scheduler (singleton) ────────────────────────────────────────────────────
  scheduler:
    <<: *api
    command: >
      sh -c "while true; do
        php artisan schedule:run --no-interaction 2>&1;
        sleep 60;
      done"
    deploy:
      replicas: 1

  # ─── Frontend Citoyen (Next.js) ──────────────────────────────────────────────
  citizen:
    build:
      context: ./frontend-citizen
      target: runner
    env_file: .env.citizen.production
    expose:
      - "3000"
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ─── Dashboard Admin (Next.js) ────────────────────────────────────────────────
  admin:
    build:
      context: ./admin-dashboard
      target: runner
    env_file: .env.admin.production
    expose:
      - "3001"
    networks:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ─── PostgreSQL 16 ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-esonoya}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_GN.UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    restart: unless-stopped
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-esonoya}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5

  # ─── PgBouncer — connection pooling ─────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 5
      SERVER_RESET_QUERY: "DISCARD ALL"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    expose:
      - "5432"
    restart: unless-stopped

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --save 60 1
      --save 300 10
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - backend
    expose:
      - "6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  app_storage:
  app_logs:
  nginx_logs:
  ssl_certs:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  # Internal network — no external access to DB / Redis
  backend:
    driver: bridge
    internal: true
