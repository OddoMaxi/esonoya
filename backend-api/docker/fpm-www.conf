[www]
; Dynamic process manager for variable load
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
; Recycle workers to prevent memory leaks
pm.max_requests = 500

; Avoid leaking error output to clients
php_flag[display_errors] = off
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr

; Status endpoint — scraped by monitoring
pm.status_path = /fpm-status
ping.path = /fpm-ping
